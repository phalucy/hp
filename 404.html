<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Ning Zhao</title>
    <link rel="stylesheet" href="css/style.css"> <style>
        .error-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            padding: 20px;
        }
        .error-code {
            font-size: 80px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
        }
        .error-message {
            font-size: 20px;
            color: #333;
            margin-bottom: 30px;
        }
        .home-btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: opacity 0.3s;
        }
        .home-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-message">Oops! This page has drifted away.</h1>
        <p style="color: #666; margin-bottom: 40px;">
            The link you followed may be broken, or the page may have been moved.
        </p>
        <a href="index.html" class="home-btn">Return to Homepage</a>
        
        <div style="margin-top: 60px; font-size: 0.9em; color: #999;">
            <p>If you believe this is an error, please contact me at: <br>
            <strong>your-email@example.com</strong></p>
        </div>
    </div>
</body>
</html>
